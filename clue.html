    height:1px;

}

.info{

    color:#9b9b9b;

    line-height:35px;

}

.file{

    margin-top:40px;

    background:#0c0c0c;

    border-left:4px solid #5fc7ff;

    padding:20px;

    line-height:35px;

}

.warning{

    color:#ff6f6f;

    margin-top:35px;

    font-weight:bold;

}

button{

    margin-top:40px;

    width:100%;

}

</style>

</head>
